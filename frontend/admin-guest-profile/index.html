<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Guest Profile</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="shell">
      <section class="hero">
        <div class="eyebrow">Laya Adventure Admin</div>
        <h1>Guest Profile</h1>
        <p>ดูข้อมูลแขก, wallet, ประวัติ claim และ redemption แบบรวมในหน้าเดียว</p>
      </section>
      <div id="page-status" class="status">รอโหลดข้อมูล...</div>
      <section id="summary-grid" class="grid stats-grid"></section>
      <section class="card"><h2>Guest Info</h2><div id="guest-info"></div></section>
      <section class="card"><h2>Recent Quest Claims</h2><div class="table-wrap"><table class="simple-table"><thead><tr><th>Date</th><th>Mission</th><th>Reward</th><th>Amount</th><th>Approved By</th></tr></thead><tbody id="claims-body"><tr><td colspan="5" class="empty-cell">ยังไม่มีข้อมูล</td></tr></tbody></table></div></section>
      <section class="card"><h2>Recent Redemptions</h2><div class="table-wrap"><table class="simple-table"><thead><tr><th>Status</th><th>Reward</th><th>Request</th><th>Redemption</th><th>Updated</th></tr></thead><tbody id="redemptions-body"><tr><td colspan="5" class="empty-cell">ยังไม่มีข้อมูล</td></tr></tbody></table></div></section>
    </main>
    <script src="../shared/firebase-config.js"></script>
    <script type="module" src="./app.js"></script>
  </body>
</html>
